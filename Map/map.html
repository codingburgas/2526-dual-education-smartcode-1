<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Motion Crew – Map</title>
    <link rel="icon" href="../assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="map.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ============================================================
         HEADER
    ============================================================ -->
    <header class="app-header">
         <!-- SMALL LOGO (top left) added here as a visible image element -->
            <div class="logo-container">
             <img class="small-logo" src="../assets/logo.png" alt="Green Motion Crew Logo" onerror="this.onerror=null; this.src='https://placehold.co/42x42/e0ecdb/2c5e2a?text=🌿';">
          
                <div class="logo" style="display: none;"></div>
            </div>
 
        <nav id="nav">
            <a href="../mainMenu/index.html">Home</a>
            <a href="../map/map.html">City Map</a>
            <a href="#diary">Green Diary</a>
            <a href="#tips">Resources</a>
        </nav>

        <div class="header-actions">
            <button class="eco-toggle" id="eco-toggle" title="Eco Mode - Тъмна тема">
                <span class="eco-toggle-indicator" id="eco-indicator"></span>
                Eco Mode
            </button>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">&#9776;</button>
        </div>
    </header>
    <!-- ============================================================
         MAP SECTION
    ============================================================ -->
    <section class="city-map" id="map">
        <div class="section-container">
            <div class="map-header">
                <div class="section-label">Интерактивна карта</div>
                <h2 class="section-title">Разгледай зоните</h2>
                <p class="section-subtitle">Използвай картата, за да откриваш и изследваш различни райони на града.</p>
            </div>
            <div class="map-container">
                <iframe 
                    src="https://umap.openstreetmap.fr/en/map/anonymous-edit/1386982:OfnVA1LDi32EInG_lHiJK57UdLcbfw2oI0reBtcq8s0" 
                    loading="lazy" 
                    title="Green Motion Crew Map">
                </iframe>
            </div>
        </div>
    </section>

    <script src="map.js"></script>
</body>
</html>
